<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="letter">
                    <div class="text">
                        <Strong>Dear Chalissa.</Strong>
                        <p>Hai chal! apakabar, semoga sehat selalu yaa, minal aidzin walfaizin, selamat hari lebaran yaa, LIAAT AKU BERHASIL BIKIN WEBBBBBBBB BANGGA GAK,chalissa hatihati kejakartaa yaa, chal kangen</p>
                </div>
            </div>
            <div class="heart"></div>
        </div>
    </div>

    <script>
        const envelope = document.querySelector(".envelope-wrapper");
        const heart = document.querySelector(".heart");
        heart.addEventListener("click", ()=>{
            envelope.classList.toggle("flap")
        })
    </script>
</body>
</html>
